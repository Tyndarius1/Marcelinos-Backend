name: Deploy to cPanel Staging

on:
  push:
    branches:
      - staging   # change if your deploy branch is different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to cPanel via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            set -e

            echo "Starting deployment..."

            cd "${{ secrets.CPANEL_PROJECT_PATH }}"

            echo "Project path: $(pwd)"
            echo "Current branch: $(git branch --show-current || true)"

            git fetch origin
            git reset --hard
            git clean -fd
            git pull origin staging

            if [ -f "composer.json" ]; then
              composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            fi

            if [ -f "artisan" ]; then
              php artisan migrate --force
              php artisan optimize:clear
              php artisan config:cache
              php artisan route:cache || true
              php artisan view:cache || true
            fi

            echo "Deployment completed."