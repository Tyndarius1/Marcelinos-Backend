# ============================================================
# GitHub Actions – Deploy to Hostinger Shared Hosting via SSH
# Domain: marcelinos-resort-hotel.com
#
# Hostinger hPanel hosting with SSH access enabled.
# This is NOT a VPS — no sudo, no service restarts needed.
# PHP & web server (LiteSpeed) are managed by Hostinger.
#
# Directory structure on server:
#   APP_PATH    – Laravel app root (e.g. ~/marcelinos)
#   PUBLIC_HTML – Web document root that Hostinger serves
#                 (e.g. ~/domains/marcelinos-resort-hotel.com/public_html)
#                 Gets symlinked → APP_PATH/public on first deploy
#
# FIRST-DEPLOY workflow:
#   - Clones repo, installs deps, builds assets
#   - Symlinks public_html → Laravel's public/ folder
#
# SUBSEQUENT pushes:
#   - Pulls latest code, installs deps, rebuilds, migrates
#
# NOTE: Database & .env are configured MANUALLY on the server.
#       On first deploy it copies .env.example as a starting
#       point — SSH in and edit it before the site goes live.
#
# Required GitHub Secrets:
#   SERVER_HOST    – Hostinger SSH hostname (from hPanel → SSH Access)
#   SERVER_USER    – SSH username (from hPanel → SSH Access)
#   SERVER_SSH_KEY – Private SSH key (ed25519 recommended)
#   SERVER_PORT    – SSH port (Hostinger usually uses 65002)
#   APP_PATH       – Laravel app path on server (e.g. ~/marcelinos)
#   PUBLIC_HTML    – Document root path (e.g. ~/public_html)
#
# Optional GitHub Secrets:
#   DEPLOY_TOKEN   – GitHub PAT for cloning private repos
# ============================================================

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_PATH: ${{ secrets.APP_PATH }}
          PUBLIC_HTML: ${{ secrets.PUBLIC_HTML }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_PATH,PUBLIC_HTML
          command_timeout: 30m
          script: |
            set -e

            echo "============================================="
            echo "🚀 Deploying Marcelino's Resort & Hotel"
            echo "   Hostinger Shared Hosting"
            echo "============================================="

            # ── Load Node.js via nvm (Hostinger uses nvm) ──
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh" || true

            # ── Verify tools ──
            echo "🔍 Checking available tools..."
            echo "   PHP:      $(php -v 2>/dev/null | head -1 || echo 'NOT FOUND')"
            echo "   Composer: $(composer --version 2>/dev/null | head -1 || echo 'NOT FOUND')"
            echo "   Node:     $(node -v 2>/dev/null || echo 'NOT FOUND')"
            echo "   npm:      $(npm -v 2>/dev/null || echo 'NOT FOUND')"
            echo "   Git:      $(git --version 2>/dev/null || echo 'NOT FOUND')"

            # ── Variables ──
            DEPLOY_TOKEN="${{ secrets.DEPLOY_TOKEN }}"
            if [ -n "$DEPLOY_TOKEN" ]; then
              REPO_URL="https://${DEPLOY_TOKEN}@github.com/${{ github.repository }}.git"
            else
              REPO_URL="https://github.com/${{ github.repository }}.git"
            fi
            BRANCH="${{ github.ref_name }}"
            FIRST_DEPLOY=false

            # ── Check if this is the first deploy ──
            if [ ! -d "$APP_PATH/.git" ]; then
              FIRST_DEPLOY=true
              echo "📦 First deploy detected — full setup will run"
            fi

            # ══════════════════════════════════════════════
            # FIRST DEPLOY — Clone & Full Setup
            # ══════════════════════════════════════════════
            if [ "$FIRST_DEPLOY" = true ]; then
              echo "📥 Cloning repository..."
              mkdir -p "$(dirname "$APP_PATH")"
              git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$APP_PATH"
              cd "$APP_PATH"

              # ── Copy .env from example ──
              echo "📄 Creating .env from .env.example..."
              cp .env.example .env

              # ── Install PHP dependencies ──
              echo "📦 Installing Composer dependencies..."
              composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

              # ── Generate application key ──
              echo "🔑 Generating application key..."
              php artisan key:generate --force

              # ── Install Node dependencies & build assets ──
              echo "📦 Installing Node.js dependencies..."
              npm ci --prefer-offline --no-audit

              echo "🏗️  Building frontend assets..."
              npm run build

              # ── Create storage directories ──
              echo "📁 Setting up storage directories..."
              mkdir -p storage/framework/{cache,sessions,views}
              mkdir -p storage/app/public
              mkdir -p bootstrap/cache

              # ── Storage link ──
              echo "🔗 Creating storage symlink..."
              php artisan storage:link --force

              # ── Symlink public_html → Laravel's public/ folder ──
              echo "🔗 Setting up public_html → Laravel public/ symlink..."
              if [ -d "$PUBLIC_HTML" ] && [ ! -L "$PUBLIC_HTML" ]; then
                echo "   Backing up existing public_html..."
                mv "$PUBLIC_HTML" "${PUBLIC_HTML}_backup_$(date +%Y%m%d%H%M%S)"
              fi
              ln -sfn "$APP_PATH/public" "$PUBLIC_HTML"
              echo "   ✅ $PUBLIC_HTML → $APP_PATH/public"

              # ── Run database migrations ──
              echo "🗄️  Running database migrations..."
              php artisan migrate --force

              # ── Seed database ──
              echo "🌱 Seeding database..."
              php artisan db:seed --force || echo "⚠️  No seeders to run or seeder failed (non-critical)"

              # ── Cache configuration for production ──
              echo "⚡ Caching configuration..."
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan event:cache
              php artisan icons:cache || true

              # ── Filament assets ──
              echo "🎨 Publishing Filament assets..."
              php artisan filament:assets || true

              # ── Set permissions ──
              echo "🔐 Setting file permissions..."
              chmod -R 775 storage bootstrap/cache
              chmod 640 .env

              echo ""
              echo "✅ First deploy complete!"
              echo "⚠️  IMPORTANT: SSH into the server and edit $APP_PATH/.env"
              echo "   Configure: DB_*, APP_URL, FRONTEND_URL, mail, etc."
              echo "   Then run: cd $APP_PATH && php artisan config:cache"

            # ══════════════════════════════════════════════
            # SUBSEQUENT DEPLOYS — Pull & Update
            # ══════════════════════════════════════════════
            else
              echo "🔄 Pulling latest changes..."
              cd "$APP_PATH"

              # Update remote URL in case DEPLOY_TOKEN changed
              git remote set-url origin "$REPO_URL"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"

              # ── Maintenance mode ON ──
              echo "🔧 Enabling maintenance mode..."
              php artisan down --retry=60 || true

              # ── Install/update PHP dependencies ──
              echo "📦 Updating Composer dependencies..."
              composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

              # ── Install/update Node dependencies & rebuild ──
              echo "📦 Updating Node.js dependencies..."
              npm ci --prefer-offline --no-audit

              echo "🏗️  Rebuilding frontend assets..."
              npm run build

              # ── Run database migrations ──
              echo "🗄️  Running database migrations..."
              php artisan migrate --force

              # ── Clear and rebuild caches ──
              echo "⚡ Rebuilding caches..."
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan event:cache
              php artisan icons:cache || true

              # ── Filament assets ──
              echo "🎨 Publishing Filament assets..."
              php artisan filament:assets || true

              # ── Ensure storage link exists ──
              php artisan storage:link --force || true

              # ── Ensure public_html symlink is intact ──
              if [ ! -L "$PUBLIC_HTML" ]; then
                echo "🔗 Re-creating public_html symlink..."
                if [ -d "$PUBLIC_HTML" ]; then
                  mv "$PUBLIC_HTML" "${PUBLIC_HTML}_backup_$(date +%Y%m%d%H%M%S)"
                fi
                ln -sfn "$APP_PATH/public" "$PUBLIC_HTML"
              fi

              # ── Fix permissions ──
              echo "🔐 Fixing permissions..."
              chmod -R 775 storage bootstrap/cache
              chmod 640 .env

              # ── Maintenance mode OFF ──
              echo "✅ Disabling maintenance mode..."
              php artisan up

              echo "✅ Deployment complete!"
            fi

            # ── Restart background services if applicable ──
            if [ -f "$APP_PATH/start-services.sh" ]; then
              echo "🔄 Starting background services..."
              cd "$APP_PATH"
              bash start-services.sh || echo "⚠️  Services start had issues (check logs)"
            fi

            echo ""
            echo "============================================="
            echo "🎉 Deployment finished successfully!"
            echo "   Domain: marcelinos-resort-hotel.com"
            echo "   Branch: $BRANCH"
            echo "   Time:   $(date)"
            echo "============================================="
