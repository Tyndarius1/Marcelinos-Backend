name: STAGING - Marcelino's APIs via FTP

on:
  push:
    branches:
      - staging

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, intl, pdo_mysql, zip, gd # Added GD for Filament image handling
          coverage: none

      - name: 📥 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: ⚙️ Optimize Laravel
        run: |
          php artisan optimize
          mkdir -p storage/framework/{sessions,views,cache}

      - name: 📤 FTP Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: /Staging-Marcelinos/
          local-dir: ./
          # IMPORTANT: vendor and public/build are NOT excluded anymore
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/tests/**
            **/uploads/**
            README.md
            .env